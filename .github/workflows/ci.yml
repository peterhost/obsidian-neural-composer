name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Type check
        run: npm run type:check
      - name: Prettier check
        run: npx prettier --check --cache-strategy content .
      - name: ESLint
        run: npx eslint .
        continue-on-error: true
      - name: Test
        run: npm test
