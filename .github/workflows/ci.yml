name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - run: npm ci
      - name: Type check
        run: npm run type:check
      - name: Prettier check
        run: npx prettier --check .
      - name: ESLint
        run: npx eslint . --max-warnings 0
      - name: Check forbidden eslint-disable comments (Obsidian bot policy)
        run: |
          if grep -rn 'eslint-disable.*import/no-nodejs-modules' src/; then
            echo "❌ Disabling 'import/no-nodejs-modules' is not allowed by the Obsidian plugin review bot."
            echo "   Use Platform.isDesktop guards and dynamic imports instead."
            exit 1
          fi
      - name: Test
        run: npm test
