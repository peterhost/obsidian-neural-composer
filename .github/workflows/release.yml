name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. 1.4.1)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Fetch full history so we can push back to main
          fetch-depth: 0
          ref: main

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.x'

      - name: Set Tag variable
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Bump version
        run: npm run version $VERSION

      - name: Commit version bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json package.json versions.json
          git diff --staged --quiet || git commit -m "chore: version bump ${{ env.TAG }}"
          git push origin main

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Attest main.js
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: main.js

      - name: Attest styles.css
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: styles.css

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq ".[] | select(.tag_name == \"$TAG\") | .id" | head -1)
          if [ -z "$RELEASE_ID" ]; then
            gh release create "$TAG" --title="$TAG" main.js manifest.json styles.css
          else
            # Upload assets directly via API (bypasses gh release upload which
            # has a 404 regression when the release was pre-created by the user)
            for file in main.js manifest.json styles.css; do
              ASSET_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" \
                --jq ".[] | select(.name == \"$file\") | .id" 2>/dev/null | head -1)
              if [ -n "$ASSET_ID" ]; then
                gh api "repos/$GITHUB_REPOSITORY/releases/assets/$ASSET_ID" \
                  --method DELETE > /dev/null 2>/dev/null || true
              fi
              gh api \
                --method POST \
                -H "Content-Type: application/octet-stream" \
                "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=$file" \
                --input "$file"
            done
          fi
